name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running Craftbox?
      options:
        - Docker
        - Standalone (Node.js)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Craftbox Version
      description: The version shown in the UI or package.json.
      placeholder: e.g. 1.0.0

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 130, Firefox 133, Safari 18

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant browser console output, server logs, or screenshots.
      render: text
