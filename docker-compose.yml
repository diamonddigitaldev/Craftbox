services:
  craftbox:
    build: .
    container_name: craftbox
    restart: unless-stopped
    ports:
      - "6464:6464"     # Web panel
      - "25565:25565"   # Default Minecraft server port
      # Add more ports as needed for additional servers:
      # - "25566:25566"
      # - "25567:25567"
    volumes:
      - craftbox-data:/app/data
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=INFO
      # - PORT=6464
    stop_grace_period: 45s

volumes:
  craftbox-data:
